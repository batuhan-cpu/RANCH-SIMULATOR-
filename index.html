<!DOCTYPE html>
<html>
<head>
<title>SİBER OPERASYON</title>
<style>
body { background: #000; color: #0f0; font-family: monospace; text-align: center; padding: 50px; }
.btn { border: 2px solid #0f0; background: none; color: #0f0; padding: 20px; font-size: 24px; cursor: pointer; }
</style>
</head>
<body>
<h1>SİBER OPERASYON AKTİF</h1>
<div id="skor">0 BITS</div>
<br>
<button class="btn" onclick="hack()">[ HACKLE ]</button>
<script>
let b = 0;
function hack() {
  b += Math.floor(Math.random() * 1000);
  document.getElementById('skor').innerText = b + " BITS";
}
</script>
</body>
</html>
