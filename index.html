<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RANCH SIMULATOR // ÇİFTLİK YÖNETİMİ</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #121810; color: #e2e8f0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 15px; }
        
        .container { max-width: 600px; margin: 0 auto; background: #1e291b; border: 3px solid #3f6212; border-radius: 12px; padding: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        
        h1 { text-align: center; color: #a3e635; font-size: 22px; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 20px; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }
        
        .hud-display { background: #0f170d; border-radius: 8px; padding: 15px; text-align: center; margin-bottom: 20px; border: 1px solid #2d4a0f; }
        .balance { font-size: 36px; color: #22c55e; font-weight: bold; text-shadow: 0 0 10px rgba(34,197,94,0.2); }
        
        .grid-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .stat-box { background: #141e12; border: 1px solid #273e15; padding: 10px; border-radius: 6px; text-align: center; font-size: 15px; }
        .stat-box span { display: block; font-size: 20px; font-weight: bold; color: #facc15; margin-top: 5px; }
        
        .btn-action { background: #3f6212; color: #fff; border: none; padding: 12px; margin-bottom: 8px; width: 100%; border-radius: 6px; font-size: 15px; font-weight: bold; cursor: pointer; transition: 0.2s; text-transform: uppercase; border-bottom: 3px solid #254d09; }
        .btn-action:hover { background: #4d7c0f; }
        .btn-action:active { transform: translateY(2px); border-bottom-width: 1px; }
        
        .terminal { background: #090d08; border: 1px solid #1c2e12; border-radius: 6px; height: 120px; padding: 10px; font-family: monospace; font-size: 12px; color: #86efac; overflow-y: hidden; line-height: 1.6; }
        
        @keyframes flash-red { 0%, 100% { background: #1e291b; } 50% { background: #450a0a; border-color: #ef4444; } }
        .danger-alert { animation: flash-red 0.5s 2; }
    </style>
</head>
<body>

    <div class="container" id="ranch-panel">
        <h1>🚜 RANCH SIMULATOR OPERASYON v1.0</h1>
        
        <div class="hud-display">
            <div style="font-size: 12px; color: #a3e635; letter-spacing: 1px;">KASA BAKİYESİ</div>
            <div class="balance" id="money-display">0.00 TL</div>
        </div>

        <div class="grid-stats">
            <div class="stat-box">🐓 TAVUK SAYISI <span id="chickens">2</span></div>
            <div class="stat-box">🪵 KERESTE STOĞU <span id="wood">0 Adet</span></div>
        </div>

        <button class="btn-action" onclick="collectEggs()">🥚 Yumurtaları Topla ve Sat</button>
        <button class="btn-action" onclick="cutWood()">🪓 Dağda Ağaç Kes (Kereste Üret)</button>
        <button class="btn-action" onclick="goHunting()">🏹 Avlanmaya Çık (Geyik/Ayı)</button>

        <div style="margin-top: 15px; font-size: 13px; color: #a3e635; font-weight: bold; margin-bottom: 5px;">📋 ÇİFTLİK GÜNLÜĞÜ:</div>
        <div class="terminal" id="log-box">
            > Çiftlik traktörü çalıştırıldı.<br>
            > Tavuk kümesi kontrol edildi, sitem aktif.
        </div>
    </div>

    <script>
        let money = parseFloat(localStorage.getItem('ranch_money')) || 500;
        let chickenCount = parseInt(localStorage.getItem('ranch_chickens')) || 2;
        let woodCount = parseInt(localStorage.getItem('ranch_wood')) || 0;

        function addLog(msg) {
            const box = document.getElementById('log-box');
            box.innerHTML += `<br>> ${msg}`;
            let lines = box.innerHTML.split('<br>');
            if(lines.length > 5) { lines.shift(); box.innerHTML = lines.join('<br>'); }
        }

        function updateUI() {
            document.getElementById('money-display').innerText = money.toLocaleString('tr-TR', { minimumFractionDigits: 2 }) + " TL";
            document.getElementById('chickens').innerText = chickenCount;
            document.getElementById('wood').innerText = woodCount + " Adet";
            
            localStorage.setItem('ranch_money', money);
            localStorage.setItem('ranch_chickens', chickenCount);
            localStorage.setItem('ranch_wood', woodCount);
        }

        function collectEggs() {
            let eggs = chickenCount * Math.floor(Math.random() * 3 + 1);
            let gain = eggs * 15;
            money += gain;
            addLog(`${chickenCount} tavuktan ${eggs} yumurta toplandı, markete satıldı: +${gain} TL`);
            updateUI();
        }

        function cutWood() {
            let cut = Math.floor(Math.random() * 4 + 2);
            woodCount += cut;
            addLog(`Ormanda ağaç kesildi. +${cut} adet tomruk keresteye dönüştürüldü.`);
            updateUI();
        }

        function goHunting() {
            let chance = Math.random();
            if (chance > 0.4) {
                // Başarılı Av
                let meatGain = Math.floor(Math.random() * 400 + 200);
                money += meatGain;
                addLog(`Av başarılı! Geyik avlandı, etler kasaba satıldı: +${meatGain} TL`);
            } else {
                // Başarısızlık / Ayı Saldırısı (Para veya Tavuk Azalması)
                document.getElementById('ranch-panel').classList.add('danger-alert');
                setTimeout(() => document.getElementById('ranch-panel').classList.remove('danger-alert'), 1000);
                
                if (chickenCount > 1) {
                    chickenCount--;
                    addLog(`<span style="color:#f87171;">⚠️ AYI SALDIRISI! Çiftliğe ayı daldı, 1 tavuk telef oldu!</span>`);
                } else {
                    let hospitalBill = 150;
                    money -= hospitalBill;
                    if(money < 0) money = 0;
                    addLog(`<span style="color:#f87171;">⚠️ AV KAZASI! Ayı seni yaraladı, hastane masrafı: -${hospitalBill} TL</span>`);
                }
            }
            updateUI();
        }

        // Rastgele Çiftlik Olayları (Düşüş ve Çıkış Dinamiği)
        setInterval(() => {
            let eventChance = Math.random();
            if (eventChance > 0.85) {
                // Kötü Olay (Düşüş)
                let tax = Math.floor(Math.random() * 80 + 20);
                money -= tax;
                if(money < 0) money = 0;
                addLog(`<span style="color:#f87171;">📉 Çiftlik vergisi ve yem faturası kesildi: -${tax} TL</span>`);
            } else if (eventChance < 0.15 && woodCount > 0) {
                // Keresteleri otomatik satma fırsatı
                let sellPrice = woodCount * 60;
                money += sellPrice;
                addLog(`<span style="color:#60a5fa;">💰 Toptancı çiftliğe geldi! ${woodCount} adet kereste satıldı: +${sellPrice} TL</span>`);
                woodCount = 0;
            }
            updateUI();
        }, 8000); // Her 8 saniyede bir çiftlikte hayat akar

        // İlk Açılış
        window.onload = updateUI;
    </script>
</body>
</html>
